services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: watchdog-postgres
    environment:
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: monitor_password
      POSTGRES_DB: monitoreo_recursos
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "hot_standby=on"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d monitoreo_recursos"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgres-replica:
    image: timescale/timescaledb-ha:pg16
    container_name: watchdog-postgres-replica
    user: root
    entrypoint: ["/scripts/replica-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: replicator
      PGPASSWORD: replicator_password
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/postgres/replica-entrypoint.sh:/scripts/replica-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor_user -d monitoreo_recursos"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: watchdog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data: