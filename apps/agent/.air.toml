root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/agent ./cmd/agent"
  bin = "tmp/agent"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["bin", "tmp", "vendor", "testdata"]
  delay = 500
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = true

[color]
  main = "magenta"
  build = "yellow"
  runner = "green"
