version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: monitoreo-postgres
    environment:
      POSTGRES_USER: monitor_user
      POSTGRES_PASSWORD: monitor_password
      POSTGRES_DB: monitoreo_recursos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: